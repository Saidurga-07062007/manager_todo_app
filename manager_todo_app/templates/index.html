<!DOCTYPE html>
<html>
<head>
    <title>Manager To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Manager To-Do List</h1>

<form action="/add" method="POST">

    <input type="text" name="task" placeholder="Enter Task" required>

    <select name="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <button type="submit">Add Task</button>

</form>

<br>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Task</th>
    <th>Priority</th>
    <th>Status</th>
    <th>Actions</th>
</tr>

{% for task in tasks %}

<tr>

    <td>{{ task[0] }}</td>
    <td>{{ task[1] }}</td>
    <td>{{ task[2] }}</td>
    <td>{{ task[3] }}</td>

    <td>

        <a href="/complete/{{ task[0] }}">
            Complete
        </a>

        |

        <a href="/delete/{{ task[0] }}">
            Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
